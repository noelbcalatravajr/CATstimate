<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CATstimate — Design Kit</title>

  <!-- Fonts: clean sans for body + chunky pixel display + mono for codey labels -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Silkscreen:wght@400;700&family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* ── BRAND PALETTE (locked) ───────────────────────────── */
      --navy:        #1e2e6e;
      --navy-deep:   #1a2340;
      --blue:        #3a5bd9;
      --blue-2:      #2a4ac0;
      --blue-soft:   #e8eeff;
      --blue-bg:     #f0f3ff;
      --blue-border: #c8d4f8;
      --amber:       #c07a10;
      --amber-soft:  #fff5e0;
      --amber-border:#f0d8a0;
      --green:       #1a8a55;
      --green-soft:  #e6f9f0;
      --green-border:#a8e4c8;
      --red:         #c03030;
      --red-soft:    #fff0f0;
      --red-border:  #f8c8c8;
      --purple:      #6040c0;
      --purple-soft: #f0eeff;
      --purple-border:#d0c8f0;
      --hat-yellow:  #f4c91a;

      /* ── NEUTRALS ─────────────────────────────────────────── */
      --bg-page:     #f0f2f8;
      --bg-canvas:   #f7f8fc;
      --ink:         #1a2340;
      --ink-2:       #5a6a9a;
      --muted:       #8896c8;
      --border:      #e2e6f0;
      --border-2:    #dde2f0;
      --surface:     #ffffff;
      --surface-2:   #f8f9fd;

      /* ── TYPE STACKS ──────────────────────────────────────── */
      --font-body:    "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
      --font-pixel:   "Silkscreen", "Pixelify Sans", monospace;
      --font-pixel-2: "Pixelify Sans", "Silkscreen", monospace;
      --font-mono:    "IBM Plex Mono", ui-monospace, monospace;

      /* ── SCALE ────────────────────────────────────────────── */
      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 12px;
      --pixel: 2px;
    }

    /* THEME: PIXEL POP — chunkier pixel feel everywhere */
    [data-theme="pixel"] {
      --r-sm: 0px;
      --r-md: 0px;
      --r-lg: 0px;
    }

    /* THEME: BLUEPRINT — technical grid feel, deeper navy */
    [data-theme="blueprint"] {
      --bg-page:   #eef3fa;
      --bg-canvas: #e6eef8;
      --blue:      #1d4ed8;
      --blue-2:    #1e40af;
      --navy:      #0f2350;
      --ink:       #0b1a3a;
      --ink-2:     #3a4a78;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg-page);
      font-family: var(--font-body);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Blueprint grid background applied to body when in blueprint mode */
    body[data-bg="grid"] {
      background-color: var(--bg-page);
      background-image:
        linear-gradient(to right, rgba(29,78,216,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(29,78,216,.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Pixel-art image rendering for sprites */
    .pixel-art {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Headings use pixel display by default in pixel theme */
    .display {
      font-family: var(--font-pixel);
      letter-spacing: 0.02em;
      font-weight: 400;
    }
    .display-soft {
      font-family: var(--font-pixel-2);
      font-weight: 500;
    }
    .mono { font-family: var(--font-mono); }

    /* Reusable PIXEL BORDER — stepped corners via box-shadow stack */
    .pixel-box {
      background: var(--surface);
      box-shadow:
        0 0 0 var(--pixel) var(--ink),
        var(--pixel) var(--pixel) 0 0 var(--ink),
        var(--pixel) var(--pixel) 0 var(--pixel) var(--ink);
      position: relative;
    }
    [data-theme="pixel"] .pixel-frame {
      border: var(--pixel) solid var(--ink);
      box-shadow: 4px 4px 0 0 var(--ink);
      border-radius: 0 !important;
    }

    /* Scrollbar tone */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ────────────────────────────────────────────────────────
       LAYOUT
       ──────────────────────────────────────────────────────── */
    .app-shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 860px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: relative !important; height: auto !important; border-right: none !important; border-bottom: 1px solid var(--border); }
      .sidebar nav { display: flex !important; flex-direction: row !important; flex-wrap: wrap; gap: 4px !important; padding: 8px 12px !important; }
      .sidebar .brand-row { padding: 12px !important; }
      .sidebar .nav-item { padding: 6px 10px !important; font-size: 12px !important; }
    }

    .sidebar {
      position: sticky; top: 0; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar .brand-row {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar .brand-mark {
      width: 40px; height: 40px; flex-shrink: 0;
      background: var(--navy);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    [data-theme="pixel"] .sidebar .brand-mark {
      box-shadow: 3px 3px 0 0 var(--ink);
      border: var(--pixel) solid var(--ink);
    }
    .sidebar .brand-mark img { width: 32px; height: 32px; }
    .sidebar .brand-name {
      font-family: var(--font-pixel);
      font-size: 14px;
      color: var(--navy-deep);
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .sidebar .brand-sub {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .sidebar nav {
      padding: 14px 10px;
      display: flex; flex-direction: column; gap: 1px;
      flex: 1; overflow-y: auto;
    }
    .nav-group-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 14px 12px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      border-radius: var(--r-sm);
      font-size: 13px;
      color: var(--ink-2);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s, color 0.1s;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--ink); }
    .nav-item.active {
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 600;
    }
    .nav-item .dot {
      width: 6px; height: 6px; background: var(--blue);
      border-radius: 50%;
      opacity: 0;
    }
    .nav-item.active .dot { opacity: 1; }
    [data-theme="pixel"] .nav-item .dot { border-radius: 0; }

    .sidebar .foot {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Main content area */
    main { padding: 36px 48px 80px; max-width: 1200px; }
    @media (max-width: 720px) { main { padding: 24px 18px 80px; } }

    section.kit-section { margin-bottom: 56px; scroll-margin-top: 20px; }
    section.kit-section > .sec-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .sec-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .sec-title {
      font-family: var(--font-pixel);
      font-size: 28px;
      color: var(--navy-deep);
      letter-spacing: 0.01em;
      line-height: 1;
      margin-top: 4px;
    }
    .sec-desc {
      color: var(--ink-2);
      font-size: 14px;
      max-width: 520px;
      text-align: right;
      line-height: 1.5;
    }
    @media (max-width: 720px) {
      .sec-desc { text-align: left; }
      .sec-title { font-size: 22px; }
    }

    /* Group: subsection */
    .kit-sub { margin-top: 28px; }
    .kit-sub-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .kit-sub-title::after {
      content: ""; flex: 1; height: 1px; background: var(--border);
    }

    /* ────────────────────────────────────────────────────────
       SHARED COMPONENT STYLES (lifted from template, tuned)
       ──────────────────────────────────────────────────────── */
    .flat-card {
      background: var(--surface);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      padding: 18px 20px;
    }
    [data-theme="pixel"] .flat-card {
      border: var(--pixel) solid var(--ink);
      box-shadow: 4px 4px 0 0 var(--ink);
      border-radius: 0;
    }
    .section-title {
      font-size: 10px; font-weight: 700;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em;
      font-family: var(--font-mono);
    }

    /* Form field */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: 10px; font-weight: 700;
      color: var(--ink-2);
      text-transform: uppercase; letter-spacing: 0.08em;
      font-family: var(--font-mono);
    }
    .ctl-input, input.ctl-input, select.ctl-input, textarea.ctl-input {
      font-size: 13px;
      background: var(--surface);
      color: var(--ink);
      border: 1.5px solid var(--border-2);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      outline: none;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .ctl-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
    [data-theme="pixel"] .ctl-input { border-radius: 0; border-width: var(--pixel); border-color: var(--ink); }
    [data-theme="pixel"] .ctl-input:focus { box-shadow: 3px 3px 0 0 var(--blue); }

    /* Buttons */
    .btn {
      padding: 9px 16px; border-radius: var(--r-sm); cursor: pointer;
      font-size: 13px; font-weight: 700;
      border: 1.5px solid transparent;
      font-family: inherit;
      transition: all 0.1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-2); border-color: var(--blue-2); }
    .btn-outline { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
    .btn-outline:hover { background: var(--blue); color: #fff; }
    .btn-amber { background: var(--amber-soft); border-color: var(--amber); color: var(--amber); }
    .btn-amber:hover { background: var(--amber); color: #fff; }
    .btn-danger { background: var(--red-soft); border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-ghost { background: transparent; border-color: var(--border-2); color: var(--ink-2); }
    .btn-ghost:hover { border-color: var(--ink-2); color: var(--ink); }
    [data-theme="pixel"] .btn {
      border-radius: 0;
      border-width: var(--pixel);
      box-shadow: 3px 3px 0 0 var(--ink);
    }
    [data-theme="pixel"] .btn:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 0 var(--ink);
    }
    [data-theme="pixel"] .btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 0 var(--ink);
    }

    /* Badges (chips) */
    .chip {
      font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-mono);
    }
    .chip-blue   { background: var(--blue-soft);   color: var(--blue);   border: 1px solid var(--blue-border); }
    .chip-amber  { background: var(--amber-soft);  color: var(--amber);  border: 1px solid var(--amber-border); }
    .chip-green  { background: var(--green-soft);  color: var(--green);  border: 1px solid var(--green-border); }
    .chip-red    { background: var(--red-soft);    color: var(--red);    border: 1px solid var(--red-border); }
    .chip-purple { background: var(--purple-soft); color: var(--purple); border: 1px solid var(--purple-border); }
    .chip-ink    { background: var(--ink); color: #fff; border: 1px solid var(--ink); }
    [data-theme="pixel"] .chip { border-radius: 0; border-width: var(--pixel); }

    /* Notes */
    .note {
      font-size: 12px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      display: flex; gap: 10px; align-items: flex-start;
      line-height: 1.45;
    }
    .note .glyph { flex-shrink: 0; font-family: var(--font-mono); font-weight: 700; }
    .note-info  { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--border); }
    .note-warn  { background: #fffbec; color: #9a6a00; border: 1px solid var(--amber-border); }
    .note-error { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-border); }
    .note-ok    { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-border); }
    [data-theme="pixel"] .note { border-radius: 0; border-width: var(--pixel); }

    /* Stepper */
    .stepper {
      display: inline-flex; align-items: center;
      border: 1.5px solid var(--border-2);
      border-radius: var(--r-sm); overflow: hidden;
    }
    .stepper-btn {
      width: 30px; height: 30px; border: none;
      background: #eef0f8; color: var(--blue);
      font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .stepper-btn:hover { background: var(--blue); color: #fff; }
    .stepper-val {
      min-width: 32px; height: 30px; text-align: center;
      font-weight: 700; font-size: 14px; color: var(--ink);
      border-left: 1.5px solid var(--border-2); border-right: 1.5px solid var(--border-2);
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      font-variant-numeric: tabular-nums;
    }
    [data-theme="pixel"] .stepper { border-radius: 0; border-width: var(--pixel); border-color: var(--ink); }
    [data-theme="pixel"] .stepper-val { border-color: var(--ink); border-width: var(--pixel); }

    /* Tab pills */
    .tab-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab-btn {
      font-size: 11px; font-weight: 600; padding: 6px 12px;
      border-radius: 20px; border: 1.5px solid var(--border-2);
      background: var(--surface); color: var(--blue);
      cursor: pointer; font-family: inherit;
      transition: all 0.1s;
    }
    .tab-btn:hover { border-color: var(--blue); background: var(--blue-soft); }
    .tab-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    [data-theme="pixel"] .tab-btn { border-radius: 0; border-width: var(--pixel); border-color: var(--ink); }

    /* Pill count badge */
    .pill-count {
      font-size: 11px; font-weight: 700;
      color: var(--blue);
      background: var(--blue-soft);
      border-radius: 20px; padding: 3px 10px;
      border: 1px solid var(--blue-border);
      font-family: var(--font-mono);
    }
    [data-theme="pixel"] .pill-count { border-radius: 0; border-width: var(--pixel); }

    /* Metric card */
    .metric-card {
      background: var(--blue-bg); border-radius: var(--r-md);
      border: 1px solid var(--blue-border); padding: 14px 16px; text-align: center;
    }
    .metric-label {
      font-size: 10px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 6px;
      font-family: var(--font-mono);
    }
    .metric-value {
      font-size: 26px; font-weight: 800; color: var(--blue);
      font-family: var(--font-pixel-2);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .metric-unit { font-size: 11px; margin-left: 2px; color: var(--muted); font-family: var(--font-mono); font-weight: 400; }
    [data-theme="pixel"] .metric-card { border-radius: 0; border-width: var(--pixel); border-color: var(--ink); box-shadow: 3px 3px 0 0 var(--ink); }

    /* ────────────────────────────────────────────────────────
       UTIL
       ──────────────────────────────────────────────────────── */
    .row { display: flex; gap: 12px; }
    .row.wrap { flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; gap: 12px; }
    .grid { display: grid; gap: 14px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 720px) {
      .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
    .gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-14 { gap: 14px; } .gap-20 { gap: 20px; }
    .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
    .text-muted { color: var(--muted); }
    .text-mono  { font-family: var(--font-mono); }
    .text-pixel { font-family: var(--font-pixel); }
    .center { display: flex; align-items: center; justify-content: center; }

    /* App tile grid backgrounds */
    .checkerboard {
      background-color: var(--surface);
      background-image:
        linear-gradient(45deg, var(--border) 25%, transparent 25%),
        linear-gradient(-45deg, var(--border) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--border) 75%),
        linear-gradient(-45deg, transparent 75%, var(--border) 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      opacity: 0.4;
    }

    /* Speech bubble for cat */
    @keyframes bubble-in {
      0% { opacity: 0; transform: translate(-50%, -10px) scale(0.6); }
      60% { opacity: 1; transform: translate(-50%, -2px) scale(1.05); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }
    @keyframes cat-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes cat-jump {
      0% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-26px) rotate(-6deg); }
      55% { transform: translateY(-26px) rotate(6deg); }
      80% { transform: translateY(-4px) rotate(-2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes cat-spin {
      0%   { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }
    @keyframes cat-wiggle {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
    }
    @keyframes blink-eye {
      0%, 92%, 100% { transform: scaleY(1); }
      94%, 98% { transform: scaleY(0.1); }
    }
    @keyframes hat-tilt {
      0%, 100% { transform: rotate(0); }
      50% { transform: rotate(-3deg); }
    }
    /* Pose transition: small hop while the sprite cross-fades */
    @keyframes pose-hop {
      0%   { transform: translateY(0)    scale(1); }
      40%  { transform: translateY(-8px) scale(1.04); }
      100% { transform: translateY(0)    scale(1); }
    }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Tweaks panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- App pieces -->
  <script type="text/babel" src="kit-mascot.jsx"></script>
  <script type="text/babel" src="kit-foundations.jsx"></script>
  <script type="text/babel" src="kit-components.jsx"></script>
  <script type="text/babel" src="kit-patterns.jsx"></script>
  <script type="text/babel" src="kit-app.jsx"></script>
</body>
</html>
